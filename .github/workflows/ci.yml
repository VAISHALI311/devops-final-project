name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-analyze-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Cache Maven dependencies
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven

      # Build project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # SonarCloud Analysis
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=VAISHALI311_devops-final-project \
            -Dsonar.organization=vaishali311 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

      # Verify build output
      - name: Verify build output
        run: ls -al target/

      # Upload JAR to JFrog Artifactory
      - name: Upload to JFrog
        env:
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
          JFROG_URL: ${{ secrets.JFROG_URL }}
        run: |
          set -e

          JAR_FILE=$(ls target/*.jar | head -n 1)

          echo "Uploading $JAR_FILE"

          curl -f \
            -H "Authorization: Bearer $JFROG_TOKEN" \
            -T "$JAR_FILE" \
            "$JFROG_URL/artifactory/libs-release-local/$(basename "$JAR_FILE")"

          echo "Upload successful"

      # -----------------------------
      # 🚀 DEPLOY TO DEV SERVER
      # -----------------------------
      - name: Deploy to DEV
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 34.205.255.248
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying to DEV..."
            pkill -f "java" || true
            rm -f app.jar
            wget -O app.jar ${{ secrets.JFROG_URL }}/artifactory/libs-release-local/app.jar
            nohup java -jar app.jar > app.log 2>&1 &
            echo "DEV deployment done"

      # -----------------------------
      # 🚀 DEPLOY TO PROD SERVER
      # -----------------------------
      - name: Deploy to PROD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 44.203.140.107
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying to PROD..."
            pkill -f "java" || true
            rm -f app.jar
            wget -O app.jar ${{ secrets.JFROG_URL }}/artifactory/libs-release-local/app.jar
            nohup java -jar app.jar > app.log 2>&1 &
            echo "PROD deployment done"
