name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-analyze-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2

      # 4. Build project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 5. SonarCloud Analysis
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=VAISHALI311_devops-final-project \
            -Dsonar.organization=vaishali311 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

      # 6. Find JAR file
      - name: Locate JAR
        run: ls -al target/

      # 7. Upload to JFrog Artifactory
      - name: Upload JAR to JFrog
        env:
          ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
          ARTIFACTORY_API_KEY: ${{ secrets.ARTIFACTORY_API_KEY }}
        run: |
          set -e

          JAR_FILE=$(ls target/*.jar | head -n 1)

          echo "Uploading $JAR_FILE"

          curl -f -u "$ARTIFACTORY_USER:$ARTIFACTORY_API_KEY" \
            -T "$JAR_FILE" \
            "https://trial0zblyz.jfrog.io/artifactory/libs-release-local/$(basename "$JAR_FILE")"

          echo "Upload successful"
