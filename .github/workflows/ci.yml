name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      jar_name: ${{ steps.setjar.outputs.jar }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload to JFrog
        env:
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
          JFROG_URL: ${{ secrets.JFROG_URL }}
        run: |
          set -e
          JAR_FILE=$(ls target/*.jar | head -n 1)
          echo "Uploading $JAR_FILE"

          curl -f \
            -H "Authorization: Bearer $JFROG_TOKEN" \
            -T "$JAR_FILE" \
            "$JFROG_URL/artifactory/libs-release-local/app.jar"

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DEV EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JFROG_URL,JFROG_TOKEN
          script: |
            set -e
            echo "===== DEV DEPLOY START ====="

            mkdir -p /home/ubuntu/app
            sudo systemctl stop app || true
            rm -f /home/ubuntu/app/app.jar

            curl -f \
              -H "Authorization: Bearer $JFROG_TOKEN" \
              -o /home/ubuntu/app/app.jar \
              "$JFROG_URL/artifactory/libs-release-local/app.jar"

            file /home/ubuntu/app/app.jar
            ls -lh /home/ubuntu/app/app.jar

            sudo systemctl daemon-reload
            sudo systemctl restart app
            sudo systemctl status app --no-pager

            echo "===== DEV SUCCESS ====="

  deploy-prod:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to PROD EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JFROG_URL,JFROG_TOKEN
          script: |
            set -e
            echo "===== PROD DEPLOY START ====="

            mkdir -p /home/ubuntu/app
            sudo systemctl stop app || true
            rm -f /home/ubuntu/app/app.jar

            curl -f \
              -H "Authorization: Bearer $JFROG_TOKEN" \
              -o /home/ubuntu/app/app.jar \
              "$JFROG_URL/artifactory/libs-release-local/app.jar"

            file /home/ubuntu/app/app.jar
            ls -lh /home/ubuntu/app/app.jar

            sudo systemctl daemon-reload
            sudo systemctl restart app
            sudo systemctl status app --no-pager

            echo "===== PROD SUCCESS ====="
