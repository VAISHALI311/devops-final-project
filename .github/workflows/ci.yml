name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-analyze-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Cache Maven dependencies
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven

      # Build project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # SonarCloud Analysis
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=VAISHALI311_devops-final-project \
            -Dsonar.organization=vaishali311 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

      # List target files
      - name: Verify build output
        run: ls -al target/

      # Upload JAR to JFrog Artifactory (FIXED VERSION)
      - name: Upload to JFrog
        env:
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
          JFROG_URL: ${{ secrets.JFROG_URL }}
        run: |
          set -e

          JAR_FILE=$(ls target/*.jar | head -n 1)

          echo "Uploading $JAR_FILE"

          curl -f \
            -H "Authorization: Bearer $JFROG_TOKEN" \
            -T "$JAR_FILE" \
            "$JFROG_URL/artifactory/libs-release-local/$(basename "$JAR_FILE")"

          echo "Upload successful"
