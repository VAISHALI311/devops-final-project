name: Full DevOps CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-analyze-upload:
    runs-on: ubuntu-latest

    steps:
    # ---------------- Checkout Code ----------------
    - name: Checkout Repository
      uses: actions/checkout@v3

    # ---------------- Setup Java (REQUIRED: Java 17 for SonarCloud) ----------------
    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    # ---------------- Cache Maven ----------------
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

    # ---------------- Build Project ----------------
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # ---------------- SonarCloud Analysis ----------------
    - name: SonarQube Scan
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=VAISHALI311_devops-final-project \
          -Dsonar.organization=vaishali311 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # ---------------- Verify Build Output ----------------
    - name: Check Build Output
      run: ls -al target/

    # ---------------- Upload Artifact to JFrog ----------------
    - name: Upload to JFrog Artifactory
      run: |
        JAR_FILE=$(ls target/*.jar | head -n 1)
        echo "Uploading $JAR_FILE"

        curl -H "Authorization: Bearer ${{ secrets.JFROG_TOKEN }}" \
        -T $JAR_FILE \
        "${{ secrets.JFROG_URL }}/libs-release-local/demo-app-${{ github.run_number }}.jar"

    # ---------------- Success Message ----------------
    - name: Success Message
      run: echo "CI Pipeline Completed Successfully 🚀"
