name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build
        run: mvn clean package -DskipTests

      - name: Upload to JFrog
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
        run: |
          JAR=$(ls target/*.jar | head -n 1)

          curl -f -H "Authorization: Bearer $JFROG_TOKEN" \
            -T "$JAR" \
            "$JFROG_URL/artifactory/libs-release-local/app.jar"

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy DEV
        uses: appleboy/ssh-action@v1.0.3
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JFROG_URL,JFROG_TOKEN
          script: |
            set -e
            echo "===== DEV DEPLOY ====="

            sudo systemctl stop app || true
            rm -f /home/ubuntu/app/app.jar
            mkdir -p /home/ubuntu/app

            curl -f -H "Authorization: Bearer $JFROG_TOKEN" \
              -o /home/ubuntu/app/app.jar \
              "$JFROG_URL/artifactory/libs-release-local/app.jar"

            sudo systemctl daemon-reload
            sudo systemctl restart app

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: production   # 🔥 THIS gives approval gate

    steps:
      - name: Deploy PROD
        uses: appleboy/ssh-action@v1.0.3
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          envs: JFROG_URL,JFROG_TOKEN
          script: |
            set -e
            echo "===== PROD DEPLOY ====="

            sudo systemctl stop app || true
            rm -f /home/ubuntu/app/app.jar
            mkdir -p /home/ubuntu/app

            curl -f -H "Authorization: Bearer $JFROG_TOKEN" \
              -o /home/ubuntu/app/app.jar \
              "$JFROG_URL/artifactory/libs-release-local/app.jar"

            sudo systemctl daemon-reload
            sudo systemctl restart app
