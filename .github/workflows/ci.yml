name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-analyze-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # 1. Checkout Code
      # ---------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------
      # 2. Setup Java
      # ---------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------------------
      # 3. Cache Maven
      # ---------------------------
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven

      # ---------------------------
      # 4. Build Project
      # ---------------------------
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # ---------------------------
      # 5. SonarCloud Analysis
      # ---------------------------
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=VAISHALI311_devops-final-project \
            -Dsonar.organization=vaishali311 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

      # ---------------------------
      # 6. Verify Build Output
      # ---------------------------
      - name: Verify build output
        run: ls -al target/

      # ---------------------------
      # 7. Upload to JFrog
      # ---------------------------
      - name: Upload to JFrog Artifactory
        env:
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
          JFROG_URL: ${{ secrets.JFROG_URL }}
        run: |
          set -e

          JAR_FILE=$(ls target/*.jar | head -n 1)

          echo "Uploading $JAR_FILE"

          curl -f \
            -H "Authorization: Bearer $JFROG_TOKEN" \
            -T "$JAR_FILE" \
            "$JFROG_URL/artifactory/libs-release-local/app.jar"

          echo "Upload successful"

      # ---------------------------
      # 8. Deploy to DEV (STABLE)
      # ---------------------------
      - name: Deploy to DEV via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== DEPLOYING TO DEV ==="

            # Stop service safely
            sudo systemctl stop app || true

            # Create folder if not exists
            mkdir -p /home/ubuntu/app

            # Remove old jar
            rm -f /home/ubuntu/app/app.jar

            # Download latest jar from Artifactory
            wget -O /home/ubuntu/app/app.jar ${{ secrets.JFROG_URL }}/artifactory/libs-release-local/app.jar

            # Start service
            sudo systemctl start app

            # Check status
            sudo systemctl status app --no-pager

            echo "=== DEPLOYMENT SUCCESSFUL ==="
