name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-analyze-deploy:
    runs-on: ubuntu-latest

    steps:
      # ------------------------
      # 1. Checkout code
      # ------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------
      # 2. Setup Java
      # ------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ------------------------
      # 3. Cache Maven
      # ------------------------
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven

      # ------------------------
      # 4. Build JAR
      # ------------------------
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # ------------------------
      # 5. Verify JAR exists (IMPORTANT DEBUG STEP)
      # ------------------------
      - name: Verify build output
        run: |
          ls -lh target/
          file target/*.jar

      # ------------------------
      # 6. SonarCloud Analysis
      # ------------------------
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=VAISHALI311_devops-final-project \
            -Dsonar.organization=vaishali311 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

      # ------------------------
      # 7. Upload JAR to JFrog (FIXED)
      # ------------------------
      - name: Upload to JFrog
        env:
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
          JFROG_URL: ${{ secrets.JFROG_URL }}
        run: |
          set -e

          JAR_FILE=$(ls target/*.jar | head -n 1)

          echo "Uploading $JAR_FILE"

          curl -f \
            -H "Authorization: Bearer $JFROG_TOKEN" \
            -T "$JAR_FILE" \
            "$JFROG_URL/artifactory/libs-release-local/app.jar"

          echo "Upload successful"

      # ------------------------
      # 8. Deploy to DEV via SSH
      # ------------------------
      - name: Deploy to Dev Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: JFROG_URL,JFROG_TOKEN
          script: |
            set -e

            echo "===== DEPLOYING TO DEV ====="

            mkdir -p /home/ubuntu/app

            # Stop app if running
            sudo systemctl stop app || true

            # Remove old jar
            rm -f /home/ubuntu/app/app.jar

            echo "Downloading JAR from JFrog..."

            # Secure download
            curl -f \
              -H "Authorization: Bearer $JFROG_TOKEN" \
              -o /home/ubuntu/app/app.jar \
              "$JFROG_URL/artifactory/libs-release-local/app.jar"

            echo "Verifying JAR..."
            file /home/ubuntu/app/app.jar
            ls -lh /home/ubuntu/app/app.jar

            echo "Starting application..."
            sudo systemctl daemon-reload
            sudo systemctl restart app
            sudo systemctl status app --no-pager

            echo "===== DEPLOYMENT SUCCESSFUL ====="
