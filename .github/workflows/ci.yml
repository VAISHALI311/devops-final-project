name: CI-CD Pipeline (DEV + PROD)

on:
  push:
    branches:
      - main

jobs:

# =========================
# 1. BUILD + UPLOAD JAR
# =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Upload to JFrog
        run: |
          curl -f -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" \
          -T target/*.jar \
          "${{ secrets.JFROG_URL }}/artifactory/libs-release-local/app.jar"

# =========================
# 2. DEPLOY TO DEV
# =========================
  deploy-dev:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DEV Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          envs: JFROG_URL,JFROG_TOKEN
          script: |
            set -e

            echo "===== DEV DEPLOYMENT ====="

            sudo systemctl stop app || true
            rm -f /home/ubuntu/app/app.jar
            mkdir -p /home/ubuntu/app

            curl -f \
              -H "Authorization: Bearer $JFROG_TOKEN" \
              -o /home/ubuntu/app/app.jar \
              "$JFROG_URL/artifactory/libs-release-local/app.jar"

            file /home/ubuntu/app/app.jar
            ls -lh /home/ubuntu/app/app.jar

            sudo systemctl daemon-reload
            sudo systemctl restart app
            sudo systemctl status app --no-pager

            echo "===== DEV SUCCESS ====="

# =========================
# 3. DEPLOY TO PROD
# =========================
  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to PROD Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          envs: JFROG_URL,JFROG_TOKEN
          script: |
            set -e

            echo "===== PROD DEPLOYMENT ====="

            sudo systemctl stop app || true
            rm -f /home/ubuntu/app/app.jar
            mkdir -p /home/ubuntu/app

            curl -f \
              -H "Authorization: Bearer $JFROG_TOKEN" \
              -o /home/ubuntu/app/app.jar \
              "$JFROG_URL/artifactory/libs-release-local/app.jar"

            file /home/ubuntu/app/app.jar
            ls -lh /home/ubuntu/app/app.jar

            sudo systemctl daemon-reload
            sudo systemctl restart app
            sudo systemctl status app --no-pager

            echo "===== PROD SUCCESS ====="
