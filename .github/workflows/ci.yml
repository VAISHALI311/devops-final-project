name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload to JFrog
        env:
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
          JFROG_URL: ${{ secrets.JFROG_URL }}
        run: |
          set -e

          echo "JFROG_URL is: $JFROG_URL"

          JAR_FILE=$(ls target/*.jar | head -n 1)

          curl -f \
            -H "Authorization: Bearer $JFROG_TOKEN" \
            -T "$JAR_FILE" \
            "$JFROG_URL/artifactory/libs-release-local/app.jar"

      - name: Deploy to EC2 (SSH)
        uses: appleboy/ssh-action@v1.0.3
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JFROG_URL,JFROG_TOKEN
          script: |
            set -e

            echo "===== DEPLOY START ====="

            mkdir -p /home/ubuntu/app

            sudo systemctl stop app || true

            rm -f /home/ubuntu/app/app.jar

            echo "Downloading JAR..."
            curl -f \
              -H "Authorization: Bearer $JFROG_TOKEN" \
              -o /home/ubuntu/app/app.jar \
              "$JFROG_URL/artifactory/libs-release-local/app.jar"

            echo "Verifying JAR..."
            file /home/ubuntu/app/app.jar
            ls -lh /home/ubuntu/app/app.jar

            echo "Starting service..."
            sudo systemctl daemon-reload
            sudo systemctl restart app
            sudo systemctl status app --no-pager

            echo "===== DEPLOY SUCCESS ====="
